{% extends "templates/web.html" %}

{% block head_include %}
{{ super() }}
<link type="text/css" rel="stylesheet" href="/assets/frappe/css/fonts/fontawesome/font-awesome.min.css">
<style>
    /* Ensure Font Awesome icons use the FontAwesome font even if global fonts are applied later */
    .fa { font-family: FontAwesome !important; }
</style>
{% endblock %}

{% block page_content %}
<div id="test-app" style="padding: 24px;"></div>

<script>
frappe.ready(function() {
    // Dynamically load the bundle via frappe.require so the hashed asset
    // filename from the build manifest is used automatically.
    frappe.require("test_app.bundle.js", function() {
        new frappe.ui.TestApp({ wrapper: document.getElementById('test-app') });
    });
});
</script>
   
<!-- diagnostics removed -->

{% endblock %}
